<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reward App</title>

<script src="//libtl.com/sdk.js"
        data-zone="11245827"
        data-sdk="show_11245827"></script>

<style>
body{
    font-family:tahoma;
    text-align:center;
    background:#f5f5f5;
    padding:20px;
}

.card{
    max-width:400px;
    margin:auto;
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

.balance{
    font-size:28px;
    margin:20px 0;
}

button{
    border:none;
    background:#0088cc;
    color:white;
    padding:15px 25px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button:disabled{
    opacity:.5;
}
</style>
</head>

<body>

<div class="card">
    <h2>کسب سکه</h2>

    <div class="balance">
        🪙 <span id="coins">0</span>
    </div>

    <button onclick="watchAd()">
        مشاهده تبلیغ
    </button>

    <p>هر تبلیغ = 10 سکه</p>
</div>

<script>

let coins = Number(localStorage.getItem("coins")) || 0;

function updateUI(){
    document.getElementById("coins").textContent = coins;
}

updateUI();

function addCoins(amount){
    coins += amount;
    localStorage.setItem("coins", coins);
    updateUI();
}

function watchAd(){

    show_11245827()
    .then(() => {

        addCoins(10);

        alert("10 سکه دریافت کردی!");

    })
    .catch(() => {

        alert("تبلیغ کامل مشاهده نشد");

    });

}

</script>

</body>
</html>
