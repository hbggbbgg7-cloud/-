<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Rewards Pro</title>

<script src="//libtl.com/sdk.js"
        data-zone="11245827"
        data-sdk="show_11245827"></script>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:20px;
    font-family:tahoma,sans-serif;
    background:#0f172a;
    color:white;
}

.container{
    max-width:500px;
    margin:auto;
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.balance-card{
    background:#1e293b;
    border-radius:20px;
    padding:25px;
    text-align:center;
    margin-bottom:20px;
}

.balance{
    font-size:40px;
    font-weight:bold;
}

.stats{
    margin-top:10px;
    color:#cbd5e1;
}

.ad-card{
    background:#1e293b;
    border-radius:20px;
    padding:20px;
    margin-bottom:15px;
}

.btn{
    width:100%;
    border:none;
    border-radius:14px;
    padding:16px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.reward{
    background:#2563eb;
    color:white;
}

.popup{
    background:#16a34a;
    color:white;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#94a3b8;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>💰 Coin Rewards</h1>
</div>

<div class="balance-card">
<div class="balance">
🪙 <span id="coins">0</span>
</div>

<div class="stats">
تبلیغات دیده شده:
<span id="adsSeen">0</span>
</div>
</div>

<div class="ad-card">
<h3>🎥 تبلیغ جایزه‌ای</h3>
<p>پاداش: 10 سکه</p>
<button class="btn reward" onclick="watchRewardedAd()">
مشاهده تبلیغ
</button>
</div>

<div class="ad-card">
<h3>🪟 تبلیغ پاپ‌آپ</h3>
<p>پاداش: 5 سکه</p>
<button class="btn popup" onclick="watchPopupAd()">
نمایش پاپ‌آپ
</button>
</div>

<div class="footer">
Powered by Monetag
</div>

</div>

<script>

let coins = Number(localStorage.getItem("coins")) || 0;
let adsSeen = Number(localStorage.getItem("adsSeen")) || 0;

function saveData(){
    localStorage.setItem("coins", coins);
    localStorage.setItem("adsSeen", adsSeen);
}

function updateUI(){
    document.getElementById("coins").innerText = coins;
    document.getElementById("adsSeen").innerText = adsSeen;
}

function reward(amount){
    coins += amount;
    adsSeen++;
    saveData();
    updateUI();
}

updateUI();

function watchRewardedAd(){

    show_11245827()
    .then(() => {

        reward(10);
        alert("10 سکه دریافت کردی 🎉");

    })
    .catch(() => {

        alert("تبلیغ نمایش داده نشد");

    });

}

function watchPopupAd(){

    show_11245827('pop')
    .then(() => {

        reward(5);
        alert("5 سکه دریافت کردی 🎉");

    })
    .catch(() => {

        alert("خطا در نمایش تبلیغ");

    });

}

</script>

</body>
</html>
