<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Rewards</title>

<script src="//libtl.com/sdk.js"
        data-zone="11245827"
        data-sdk="show_11245827"></script>

<style>
body{
    margin:0;
    padding:20px;
    font-family:tahoma,sans-serif;
    background:#f4f4f4;
    text-align:center;
}

.card{
    max-width:450px;
    margin:auto;
    background:#fff;
    border-radius:15px;
    padding:20px;
    box-shadow:0 0 15px rgba(0,0,0,.1);
}

.balance{
    font-size:32px;
    margin:20px 0;
    font-weight:bold;
}

.btn{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.reward{
    background:#0088cc;
    color:white;
}

.popup{
    background:#28a745;
    color:white;
}

.info{
    margin-top:15px;
    color:#666;
}
</style>
</head>
<body>

<div class="card">

<h2>💰 کسب سکه</h2>

<div class="balance">
🪙 <span id="coins">0</span>
</div>

<button class="btn reward" onclick="watchRewardedAd()">
🎥 مشاهده تبلیغ جایزه‌ای (+10)
</button>

<button class="btn popup" onclick="watchPopupAd()">
🪟 مشاهده تبلیغ پاپ‌آپ (+5)
</button>

<div class="info">
هر تبلیغ جایزه‌ای = 10 سکه<br>
هر تبلیغ پاپ‌آپ = 5 سکه
</div>

</div>

<script>

let coins = Number(localStorage.getItem("coins")) || 0;

function updateUI(){
    document.getElementById("coins").innerText = coins;
}

function saveCoins(){
    localStorage.setItem("coins", coins);
}

function addCoins(amount){
    coins += amount;
    saveCoins();
    updateUI();
}

updateUI();

function watchRewardedAd(){

    show_11245827()
    .then(() => {

        addCoins(10);

        alert("10 سکه دریافت کردی 🎉");

    })
    .catch(() => {

        alert("تبلیغ کامل مشاهده نشد");

    });

}

function watchPopupAd(){

    show_11245827('pop')
    .then(() => {

        addCoins(5);

        alert("5 سکه دریافت کردی 🎉");

    })
    .catch(() => {

        alert("خطا در نمایش تبلیغ");

    });

}

</script>

</body>
</html>
