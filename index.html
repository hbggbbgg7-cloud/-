<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Rewards Pro</title>

<!-- ===== SDK های تبلیغاتی ===== -->

<!-- 1. Monetag SDK -->
<script src="//libtl.com/sdk.js" data-zone="11245827" data-sdk="show_11245827"></script>

<!-- 2. Adexora SDK -->
<script src="https://adexora.com/cdn/ads.js?id=2126"></script>

<!-- 3. OnClickA SDK (نسخه کامل و به‌روز) -->
<script src="https://cdn.onclicka.com/ads/onclicka.js"></script>

<!-- 4. کد Anti AdBlock OnClickA (برای افزایش درآمد) -->
<script async src="https://js.onclickca.com/static/onclicka.js" data-admpid="447354"></script>

<style>
*{box-sizing:border-box}
body{margin:0;padding:20px;font-family:tahoma,sans-serif;background:#0f172a;color:white}
.container{max-width:500px;margin:auto}
.header{text-align:center;margin-bottom:20px}
.balance-card,.ad-card{background:#1e293b;border-radius:20px;padding:20px;margin-bottom:15px}
.balance{text-align:center;font-size:40px;font-weight:bold}
.stats{text-align:center;margin-top:10px;color:#cbd5e1}
.btn{width:100%;border:none;border-radius:14px;padding:16px;font-size:18px;font-weight:bold;cursor:pointer;transition:0.2s}
.btn:hover{opacity:0.85}
.reward{background:#2563eb;color:white}
.popup{background:#16a34a;color:white}
.adexora{background:#ea580c;color:white}
.onclicka{background:#8b5cf6;color:white}
.footer{text-align:center;margin-top:20px;color:#94a3b8}
</style>
</head>
<body>
<div class="container">
<div class="header"><h1>💰 Coin Rewards</h1></div>

<div class="balance-card">
<div class="balance">🪙 <span id="coins">0</span></div>
<div class="stats">تبلیغات دیده شده: <span id="adsSeen">0</span></div>
</div>

<div class="ad-card">
<h3>🎥 تبلیغ جایزه‌ای Monetag</h3>
<p>پاداش: 10 سکه</p>
<button class="btn reward" onclick="watchRewardedAd()">مشاهده تبلیغ</button>
</div>

<div class="ad-card">
<h3>🪟 تبلیغ پاپ‌آپ Monetag</h3>
<p>پاداش: 5 سکه</p>
<button class="btn popup" onclick="watchPopupAd()">نمایش پاپ‌آپ</button>
</div>

<div class="ad-card">
<h3>🔥 تبلیغ Adexora</h3>
<p>پاداش: 8 سکه</p>
<button class="btn adexora" onclick="watchAdexoraAd()">مشاهده تبلیغ Adexora</button>
</div>

<div class="ad-card">
<h3>🚀 تبلیغ OnClickA</h3>
<p>پاداش: 12 سکه</p>
<button class="btn onclicka" onclick="watchOnClickAAd()">مشاهده تبلیغ OnClickA</button>
</div>

<div class="footer">Monetag + Adexora + OnClickA</div>
</div>

<script>
// ================================================
// داده‌ها
// ================================================
let coins = Number(localStorage.getItem("coins")) || 0;
let adsSeen = Number(localStorage.getItem("adsSeen")) || 0;

function saveData(){
 localStorage.setItem("coins", coins);
 localStorage.setItem("adsSeen", adsSeen);
}
function updateUI(){
 document.getElementById("coins").innerText = coins;
 document.getElementById("adsSeen").innerText = adsSeen;
}
function addReward(amount){
 coins += amount;
 adsSeen++;
 saveData();
 updateUI();
}
updateUI();

// ================================================
// تابع کمکی برای بررسی وجود SDK
// ================================================
function isReady(sdkName, checkFn) {
  if (typeof checkFn === 'function') {
    return true;
  } else {
    console.warn(`⚠️ ${sdkName} در دسترس نیست`);
    return false;
  }
}

// ================================================
// 1. تبلیغ جایزه‌ای Monetag
// ================================================
function watchRewardedAd(){
  if (isReady('Monetag', show_11245827)) {
    show_11245827()
      .then(() => {
        addReward(10);
        alert("✅ 10 سکه دریافت کردی 🎉");
      })
      .catch(() => {
        alert("❌ تبلیغ نمایش داده نشد");
      });
  } else {
    alert("❌ SDK Monetag بارگذاری نشده");
  }
}

// ================================================
// 2. تبلیغ پاپ‌آپ Monetag
// ================================================
function watchPopupAd(){
  if (isReady('Monetag', show_11245827)) {
    show_11245827('pop')
      .then(() => {
        addReward(5);
        alert("✅ 5 سکه دریافت کردی 🎉");
      })
      .catch(() => {
        alert("❌ خطا در نمایش تبلیغ پاپ‌آپ");
      });
  } else {
    alert("❌ SDK Monetag بارگذاری نشده");
  }
}

// ================================================
// 3. تبلیغ Adexora
// ================================================
function watchAdexoraAd(){
  if (isReady('Adexora', window.showAdexora)) {
    window.showAdexora()
      .then(() => {
        addReward(8);
        alert("✅ 8 سکه دریافت کردی 🎉");
      })
      .catch((e) => {
        console.error(e);
        alert("❌ خطا در نمایش تبلیغ Adexora");
      });
  } else {
    alert("❌ SDK Adexora بارگذاری نشده (وضعیت: Pending)");
  }
}

// ================================================
// 4. تبلیغ OnClickA (با Spot ID 6122246)
// ================================================
function watchOnClickAAd(){

  // روش اول: استفاده از شیء OnClickA (نسخه جدید)
  if (typeof window.OnClickA !== 'undefined' && typeof window.OnClickA.showRewarded === 'function') {
    window.OnClickA.showRewarded({
      placementId: '6122246',  // ← Spot ID شما
      onReward: function() {
        addReward(12);
        alert("✅ 12 سکه دریافت کردی 🎉");
      },
      onError: function(error) {
        console.error('OnClickA Error:', error);
        alert("❌ خطا در نمایش تبلیغ OnClickA");
      },
      onClose: function() {
        console.log('تبلیغ OnClickA بسته شد');
      }
    });
    return;
  }

  // روش دوم: استفاده از تابع showOnClickA (نسخه قدیمی)
  if (typeof window.showOnClickA === 'function') {
    window.showOnClickA()
      .then(() => {
        addReward(12);
        alert("✅ 12 سکه دریافت کردی 🎉");
      })
      .catch((e) => {
        console.error(e);
        alert("❌ خطا در نمایش تبلیغ OnClickA");
      });
    return;
  }

  // اگر هیچکدام در دسترس نبود
  alert("❌ SDK OnClickA بارگذاری نشده. لطفاً با VPN (کشورهای اروپایی/آمریکا) تست کنید.");
}
</script>
</body>
</html>
